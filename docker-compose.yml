# ============================================================================
# Belva-GEN — Local Development Infrastructure
# ============================================================================
# Usage:
#   make infra-up      Start all services
#   make infra-down    Stop all services
#   make db-studio     Open Prisma Studio
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: belva-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: belva
      POSTGRES_PASSWORD: belva
      POSTGRES_DB: belva_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belva"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: belva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── OpenClaw (Optional) ─────────────────────────────────────────────────────
  # Only starts when explicitly requested:
  #   docker compose --profile openclaw up
  openclaw:
    image: openclaw/openclaw:latest
    container_name: belva-openclaw
    profiles:
      - openclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OPENCLAW_PORT: 8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:
